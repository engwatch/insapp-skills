<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Отчёт МФО — ЛОКО-Банк</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap');
:root{--bg:#F5F6F8;--card:#fff;--v:#1D4ED8;--v2:#2563EB;--green2:#16A34A;--t1:#111827;--t2:#374151;--t3:#6B7280;--t4:#9CA3AF;--r1:10px;--r2:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--t1);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
.header{display:flex;align-items:center;gap:16px;padding:0 28px;height:56px;background:#fff;border-bottom:1px solid rgba(15,23,42,.08)}
.header h1{font-size:13px;font-weight:600;color:var(--t3)}
.header .sep{width:1px;height:20px;background:rgba(15,23,42,.10);margin:0 4px}
.controls{display:flex;gap:10px;align-items:center;padding:20px 28px;flex-wrap:wrap}
.controls input[type=date]{padding:8px 14px;border:1px solid rgba(15,23,42,.15);border-radius:var(--r1);font-size:13px;font-weight:500;font-family:inherit;background:#fff;color:var(--t1)}
.controls input:focus{outline:none;border-color:var(--v);box-shadow:0 0 0 3px rgba(29,78,216,.1)}
.dash{color:var(--t4);font-size:13px}
.btn{padding:9px 22px;border:none;border-radius:var(--r1);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-primary{background:var(--v);color:#fff}
.btn-primary:hover{background:var(--v2)}
.btn:disabled{opacity:.4;cursor:wait}
.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;padding:0 28px 24px}
.card{background:var(--card);border:1px solid rgba(15,23,42,.08);border-radius:var(--r2);padding:18px 16px}
.card .label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t4);margin-bottom:8px}
.card .value{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:800;letter-spacing:-1px;color:var(--t1);line-height:1}
.card .value.accent{color:var(--v)}
.card .value.green{color:var(--green2)}
.table-wrap{padding:0 28px 48px}
table{width:100%;border-collapse:separate;border-spacing:0;background:var(--card);border-radius:var(--r2);overflow:hidden;border:1px solid rgba(15,23,42,.08)}
thead th{background:#F9FAFB;padding:12px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--t4);text-align:right;border-bottom:1px solid rgba(15,23,42,.08);white-space:nowrap}
thead th:first-child{text-align:left;width:auto;padding:12px}
tbody td{padding:12px;font-size:15px;font-weight:500;text-align:right;border-bottom:1px solid rgba(15,23,42,.05);font-variant-numeric:tabular-nums;color:var(--t1)}
tbody td:first-child{text-align:left;font-weight:600;color:var(--t1)}
tbody tr.total-row{background:#F9FAFB}
tbody tr.total-row td{border-top:1px solid rgba(15,23,42,.1);border-bottom:none;padding:14px 12px;font-weight:700;font-size:15px}
thead th.col-issued{color:var(--v)}
.pct{font-size:11px;font-weight:400;color:var(--t4)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(15,23,42,.12);border-top-color:var(--v);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:var(--t3);font-size:13px;font-weight:500}
#status{color:var(--t3);font-size:13px;font-weight:500;margin-left:4px}
thead th.sortable{cursor:pointer;user-select:none;transition:color .15s}
thead th.sortable:hover{color:var(--t2)}
.sort-arrow{font-weight:400;color:var(--v)}
.login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:#fff;border-radius:16px;padding:40px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
.login-box h2{font-size:16px;font-weight:700;margin-bottom:20px;color:var(--t1)}
.login-box input{display:block;width:100%;padding:10px 14px;border:1px solid rgba(15,23,42,.15);border-radius:var(--r1);font-size:14px;font-family:inherit;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:var(--v);box-shadow:0 0 0 3px rgba(29,78,216,.1)}
.login-box .btn{width:100%;margin-top:4px}
.login-error{color:#DC2626;font-size:12px;font-weight:500;margin-bottom:8px;display:none}
@media(max-width:1100px){.cards{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.controls,.cards,.table-wrap{padding-left:16px;padding-right:16px}.cards{grid-template-columns:repeat(2,1fr)}.card .value{font-size:20px}}
</style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <h2>Отчёт МФО — ЛОКО-Банк</h2>
    <div id="loginError" class="login-error"></div>
    <input type="text" id="loginUser" placeholder="Логин" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Пароль" autocomplete="current-password">
    <button class="btn btn-primary" onclick="doLogin()">Войти</button>
  </div>
</div>

<div id="app" style="display:none">

<div class="header">

<script>
/* === Config === */
var MCP_URL = 'https://db-mcp.insapp.pro/mcp';
var MCP_KEY = '810075b46868cd6e240576f92630d5ca32f971512cbeaf6e';
var PARTNER_ID = '4e96325d-0734-4989-bddd-eebf459d132e';
var SPLIT = 80;
var AUTH_USER = 'loko-mfo';
var AUTH_PASS = 'L0k@9!mFz';

/* === Auth === */
function doLogin() {
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value;
  var err = document.getElementById('loginError');
  if (u === AUTH_USER && p === AUTH_PASS) {
    localStorage.setItem('loko_auth', '1');
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('app').style.display = '';
    loadData();
  } else {
    err.textContent = '\u041d\u0435\u0432\u0435\u0440\u043d\u044b\u0439 \u043b\u043e\u0433\u0438\u043d \u0438\u043b\u0438 \u043f\u0430\u0440\u043e\u043b\u044c';
    err.style.display = '';
  }
}
document.getElementById('loginPass').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
if (localStorage.getItem('loko_auth') === '1') {
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('app').style.display = '';
}

/* === MCP Client === */
var _sessionId = null;
var _reqId = 0;

async function mcpPost(body) {
  var headers = { 'Content-Type': 'application/json', 'Accept': 'application/json, text/event-stream', 'x-api-key': MCP_KEY };
  if (_sessionId) headers['mcp-session-id'] = _sessionId;
  var resp = await fetch(MCP_URL, { method: 'POST', headers: headers, body: JSON.stringify(body) });
  var sid = resp.headers.get('mcp-session-id') || resp.headers.get('Mcp-Session');
  if (sid) _sessionId = sid;
  return { text: await resp.text(), status: resp.status };
}

async function ensureSession() {
  if (_sessionId) return;
  await mcpPost({ jsonrpc: '2.0', method: 'initialize', params: { protocolVersion: '2024-11-05', capabilities: {}, clientInfo: { name: 'partner-report-loko', version: '1.0' } }, id: ++_reqId });
  await mcpPost({ jsonrpc: '2.0', method: 'notifications/initialized' });
}

function parseMcpResponse(text) {
  var rows = null;
  var lines = text.indexOf('data: ') >= 0 ? text.split('\n') : [text];
  for (var i = 0; i < lines.length; i++) {
    var payload = lines[i].startsWith('data: ') ? lines[i].slice(6) : lines[i];
    if (!payload.trim()) continue;
    try {
      var doc = JSON.parse(payload);
      var content = (doc.result || {}).content || [];
      for (var j = 0; j < content.length; j++) {
        if (content[j].type === 'text') {
          var inner = JSON.parse(content[j].text);
          if (inner.success && inner.rows) rows = inner.rows;
        }
      }
    } catch (e) {}
  }
  return rows || [];
}

async function mcpQuery(sql, desc) {
  for (var attempt = 0; attempt < 3; attempt++) {
    try {
      await ensureSession();
      var r = await mcpPost({ jsonrpc: '2.0', method: 'tools/call', params: { name: 'query', arguments: { database: 'InsappCoreProd', sql: sql, user_prompt: 'partner-report', query_description: desc || 'report' } }, id: ++_reqId });
      if (r.status === 401 || r.status === 403 || r.status === 404 || r.status === 410) { _sessionId = null; continue; }
      return parseMcpResponse(r.text);
    } catch (e) { _sessionId = null; }
  }
  return [];
}

/* === SQL === */
function buildSQL(start, end) {
  var pid = PARTNER_ID;
  return "WITH opens AS (" +
    " SELECT CAST(a.Created AS DATE) as dt, COUNT(*) as opens" +
    " FROM Applications a JOIN PartnerApiKeys ak ON a.ApiKeyId=ak.ApiKeyId" +
    " WHERE ak.PartnerId='" + pid + "' AND a.ProductTypeId=5 AND a.ChannelTypeId=2" +
    " AND CAST(a.Created AS DATE) >= '" + start + "' AND CAST(a.Created AS DATE) <= '" + end + "'" +
    " GROUP BY CAST(a.Created AS DATE)" +
    "), transitions AS (" +
    " SELECT CAST(a.Created AS DATE) as dt, COUNT(*) as transitions" +
    " FROM FinOffers ff JOIN Applications a ON ff.ApplicationId=a.ApplicationId" +
    " JOIN PartnerApiKeys ak ON a.ApiKeyId=ak.ApiKeyId" +
    " WHERE ff.SelectedDate IS NOT NULL AND ak.PartnerId='" + pid + "'" +
    " AND a.ProductTypeId=5 AND a.ChannelTypeId=2" +
    " AND CAST(a.Created AS DATE) >= '" + start + "' AND CAST(a.Created AS DATE) <= '" + end + "'" +
    " GROUP BY CAST(a.Created AS DATE)" +
    "), ankety AS (" +
    " SELECT CAST(a.Created AS DATE) as dt, COUNT(DISTINCT s.ApplicationId) as ankety" +
    " FROM ApplicationStatuses s JOIN Applications a ON s.ApplicationId=a.ApplicationId" +
    " JOIN PartnerApiKeys ak ON a.ApiKeyId=ak.ApiKeyId" +
    " WHERE s.ApplicationStatusTypeId='b1a2c3d4-e5f6-47a8-b9c0-d1e2f3a4b5c6'" +
    " AND ak.PartnerId='" + pid + "' AND a.ProductTypeId=5 AND a.ChannelTypeId=2" +
    " AND CAST(a.Created AS DATE) >= '" + start + "' AND CAST(a.Created AS DATE) <= '" + end + "'" +
    " GROUP BY CAST(a.Created AS DATE)" +
    "), rejections AS (" +
    " SELECT CAST(a.Created AS DATE) as dt, COUNT(*) as rejected" +
    " FROM FinOffers ff JOIN Applications a ON ff.ApplicationId=a.ApplicationId" +
    " JOIN PartnerApiKeys ak ON a.ApiKeyId=ak.ApiKeyId" +
    " WHERE ff.OfferStatusTypeId=3 AND ak.PartnerId='" + pid + "'" +
    " AND a.ProductTypeId=5 AND a.ChannelTypeId=2" +
    " AND CAST(a.Created AS DATE) >= '" + start + "' AND CAST(a.Created AS DATE) <= '" + end + "'" +
    " GROUP BY CAST(a.Created AS DATE)" +
    "), issued AS (" +
    " SELECT dt, COUNT(*) as issued, SUM(kv) as kv FROM (" +
    "  SELECT DISTINCT a.ApplicationId, CAST(a.Created AS DATE) as dt, a.IncomingComissionAmount as kv" +
    "  FROM ApplicationStatuses s JOIN Applications a ON s.ApplicationId=a.ApplicationId" +
    "  JOIN PartnerApiKeys ak ON a.ApiKeyId=ak.ApiKeyId" +
    "  JOIN ApplicationStatusTypes stt ON s.ApplicationStatusTypeId=stt.Id" +
    "  JOIN FinOffers ff ON a.ApplicationId=ff.ApplicationId AND ff.OfferStatusTypeId=6" +
    "  WHERE stt.[Index]=305 AND ak.PartnerId='" + pid + "'" +
    "  AND a.ProductTypeId=5 AND a.ChannelTypeId=2" +
    "  AND CAST(a.Created AS DATE) >= '" + start + "' AND CAST(a.Created AS DATE) <= '" + end + "'" +
    " ) sub GROUP BY dt" +
    "), ankety_total AS (" +
    " SELECT COUNT(DISTINCT s.ApplicationId) as ankety_total" +
    " FROM ApplicationStatuses s JOIN Applications a ON s.ApplicationId=a.ApplicationId" +
    " JOIN PartnerApiKeys ak ON a.ApiKeyId=ak.ApiKeyId" +
    " WHERE s.ApplicationStatusTypeId='b1a2c3d4-e5f6-47a8-b9c0-d1e2f3a4b5c6'" +
    " AND ak.PartnerId='" + pid + "' AND a.ProductTypeId=5 AND a.ChannelTypeId=2" +
    " AND CAST(a.Created AS DATE) >= '" + start + "' AND CAST(a.Created AS DATE) <= '" + end + "'" +
    ")" +
    " SELECT o.dt, o.opens, ISNULL(t.transitions,0) as transitions," +
    " ISNULL(an.ankety,0) as ankety, ISNULL(r.rejected,0) as rejected," +
    " ISNULL(i.issued,0) as issued, ISNULL(i.kv,0) as kv, at.ankety_total" +
    " FROM opens o LEFT JOIN transitions t ON o.dt=t.dt" +
    " LEFT JOIN ankety an ON o.dt=an.dt LEFT JOIN rejections r ON o.dt=r.dt" +
    " LEFT JOIN issued i ON o.dt=i.dt CROSS JOIN ankety_total at ORDER BY o.dt";
}

/* === Helpers === */
var fmt = function(v) { return v == null ? '\u2014' : Number(v).toLocaleString('ru-RU'); };
var pct = function(a, b) { return b ? Math.round(a / b * 100) + '%' : ''; };
var DATA = null;
var sortCol = 6;

function mkCell(v, sub) {
  var td = document.createElement('td');
  td.textContent = v;
  if (sub) { var s = document.createElement('span'); s.className = 'pct'; s.textContent = ' (' + sub + ')'; td.appendChild(s); }
  return td;
}
function mkTh(t, cls, sortIdx) {
  var th = document.createElement('th');
  th.textContent = t;
  if (cls) th.className = cls;
  if (sortIdx != null) {
    th.classList.add('sortable');
    if (sortCol === sortIdx) { var ar = document.createElement('span'); ar.className = 'sort-arrow'; ar.textContent = ' \u2193'; th.appendChild(ar); }
    th.addEventListener('click', function() { sortCol = sortCol === sortIdx ? 6 : sortIdx; renderTable(); });
  }
  return th;
}
function appendCells(tr, cells) { for (var i = 0; i < cells.length; i++) tr.appendChild(cells[i]); }
function sortDesc(arr, fn) {
  return arr.slice().sort(function(a, b) { var va = fn(a), vb = fn(b); if (va == null && vb == null) return 0; if (va == null) return 1; if (vb == null) return -1; return vb - va; });
}
function colVal(r, col) {
  var pk = r.kv * SPLIT / 100;
  var approved = r.ankety - r.rejected;
  switch (col) {
    case 1: return r.opens; case 2: return r.transitions; case 3: return r.ankety;
    case 4: return r.rejected; case 5: return approved; case 6: return r.issued;
    case 7: return pk; case 8: return r.transitions ? Math.round(pk / r.transitions) : null;
    case 9: return r.ankety ? Math.round(pk / r.ankety) : null; default: return 0;
  }
}

/* === Init dates === */
(function() {
  var now = new Date();
  var today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  document.getElementById('start').value = today;
  document.getElementById('end').value = today;
  if (localStorage.getItem('loko_auth') === '1') loadData();
})();

/* === Load === */
async function loadData() {
  var btn = document.getElementById('loadBtn');
  var status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = '';
  var spinner = document.createElement('span'); spinner.className = 'spinner';
  status.appendChild(spinner); status.append(' \u0417\u0430\u0433\u0440\u0443\u0437\u043a\u0430...');
  try {
    var start = document.getElementById('start').value;
    var end = document.getElementById('end').value;
    sortCol = 6;
    var sql = buildSQL(start, end);
    var rows = await mcpQuery(sql, 'LOKO ' + start + '..' + end);
    var days = [], anketyTotal = 0;
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      days.push({ date: String(r.dt || '').slice(0, 10), opens: Number(r.opens||0), transitions: Number(r.transitions||0), ankety: Number(r.ankety||0), rejected: Number(r.rejected||0), issued: Number(r.issued||0), kv: Number(r.kv||0) });
      anketyTotal = Number(r.ankety_total || 0);
    }
    DATA = { days: days, ankety_total: anketyTotal };
    renderCards();
    renderTable();
    status.textContent = '';
  } catch (e) {
    status.textContent = '\u041e\u0448\u0438\u0431\u043a\u0430: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

/* === Cards === */
function renderCards() {
  document.getElementById('cards').style.display = '';
  var d = DATA.days;
  document.getElementById('c-opens').textContent = fmt(d.reduce(function(s, r) { return s + r.opens; }, 0));
  document.getElementById('c-trans').textContent = fmt(d.reduce(function(s, r) { return s + r.transitions; }, 0));
  document.getElementById('c-anke').textContent = fmt(DATA.ankety_total);
  document.getElementById('c-issued').textContent = fmt(d.reduce(function(s, r) { return s + r.issued; }, 0));
  var totalKv = d.reduce(function(s, r) { return s + r.kv; }, 0);
  document.getElementById('c-income').textContent = fmt(Math.round(totalKv * SPLIT / 100));
  /* Run Rate */
  var el = document.getElementById('c-runrate');
  var sorted = d.slice().sort(function(a, b) { return a.date > b.date ? 1 : -1; });
  var fullDays = sorted.length > 1 ? sorted.slice(0, -1) : [];
  if (!fullDays.length) { el.textContent = '\u2014'; return; }
  var endDate = new Date(sorted[sorted.length - 1].date);
  var daysInMonth = new Date(endDate.getFullYear(), endDate.getMonth() + 1, 0).getDate();
  var fKv = fullDays.reduce(function(s, r) { return s + r.kv; }, 0);
  el.textContent = fmt(Math.round(fKv * SPLIT / 100 / fullDays.length * daysInMonth));
}

/* === Table === */
function renderTable() {
  var wrap = document.getElementById('tableWrap');
  var d = DATA.days;
  if (!d.length) { wrap.textContent = ''; var em = document.createElement('div'); em.className = 'empty'; em.textContent = '\u041d\u0435\u0442 \u0434\u0430\u043d\u043d\u044b\u0445'; wrap.appendChild(em); return; }
  if (sortCol != null) d = sortDesc(d, function(x) { return colVal(x, sortCol); });
  var tbl = document.createElement('table');
  var thead = document.createElement('thead');
  var hr = document.createElement('tr');
  ['\u0414\u0430\u0442\u0430','\u041e\u0442\u043a\u0440.','\u041f\u0435\u0440\u0435\u0445.','\u0410\u043d\u043a\u0435\u0442\u044b','\u041e\u0442\u043a\u0430\u0437\u044b','\u041e\u0434\u043e\u0431\u0440\u0435\u043d\u043e','\u0412\u044b\u0434\u0430\u0447\u0438','\u0414\u043e\u0445\u043e\u0434','EPC','EPL'].forEach(function(t, i) {
    hr.appendChild(mkTh(t, i === sortCol ? 'col-issued' : null, i >= 1 ? i : null));
  });
  thead.appendChild(hr); tbl.appendChild(thead);
  var tbody = document.createElement('tbody');
  for (var j = 0; j < d.length; j++) {
    var r = d[j];
    var pk = Math.round(r.kv * SPLIT / 100);
    var epc = r.transitions ? Math.round(pk / r.transitions) : null;
    var epl = r.ankety ? Math.round(pk / r.ankety) : null;
    var approved = r.ankety - r.rejected;
    var parts = r.date.slice(5).split('-');
    var tr = document.createElement('tr');
    appendCells(tr, [mkCell(parts[1]+'.'+parts[0]), mkCell(fmt(r.opens)), mkCell(fmt(r.transitions)),
      mkCell(fmt(r.ankety)), mkCell(fmt(r.rejected), pct(r.rejected, r.ankety)),
      mkCell(fmt(approved), pct(approved, r.ankety)),
      mkCell(fmt(r.issued), pct(r.issued, approved)),
      mkCell(fmt(pk)), mkCell(epc!=null?fmt(epc):'\u2014'), mkCell(epl!=null?fmt(epl):'\u2014')]);
    tbody.appendChild(tr);
  }
  var orig = DATA.days;
  var totO=0,totT=0,totR=0,totI=0,totK=0; for(var k=0;k<orig.length;k++){totO+=orig[k].opens;totT+=orig[k].transitions;totR+=orig[k].rejected;totI+=orig[k].issued;totK+=orig[k].kv;}
  var totA=DATA.ankety_total, totAp=totA-totR, totPk=Math.round(totK*SPLIT/100);
  var totalTr = document.createElement('tr'); totalTr.className = 'total-row';
  appendCells(totalTr, [mkCell('\u0418\u0442\u043e\u0433\u043e'), mkCell(fmt(totO)), mkCell(fmt(totT)), mkCell(fmt(totA)),
    mkCell(fmt(totR),pct(totR,totA)), mkCell(fmt(totAp),pct(totAp,totA)),
    mkCell(fmt(totI),pct(totI,totAp)), mkCell(fmt(totPk)),
    mkCell(totT?fmt(Math.round(totPk/totT)):'\u2014'), mkCell(totA?fmt(Math.round(totPk/totA)):'\u2014')]);
  tbody.appendChild(totalTr);
  tbl.appendChild(tbody); wrap.textContent = ''; wrap.appendChild(tbl);
}
</script>
